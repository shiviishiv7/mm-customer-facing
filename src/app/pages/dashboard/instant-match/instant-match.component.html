<div class="container-fluid">

  <!-- ── Video grid — always in DOM so @ViewChild is never null ──────────── -->
  <div class="row">
    <div class="col-md-6">
      <div class="video-tile">
        <video #localVideo autoplay playsinline muted class="video-player"></video>
        <span class="label">You</span>
      </div>
    </div>
    <div class="col-md-6">
      <div class="video-tile">
        <video #remoteVideo autoplay playsinline class="video-player"></video>
        <span class="label">Other User</span>
      </div>
    </div>
  </div>

  <!-- ── Controls ────────────────────────────────────────────────────────── -->
  <div class="row mt-3">
    <div class="instant-match">

      <!-- Header: title + filter button -->
      <div class="header-row">
        <h3 class="screen-title">Instant Connect</h3>
        <button mat-stroked-button color="primary" (click)="openFilters()"
                matTooltip="Set match preferences">
          <mat-icon>tune</mat-icon>
          Filters
        </button>
      </div>

      <!-- Status bar -->
      <div class="status-bar">
        Status: <strong>{{ callStatus$ | async }}</strong>
      </div>

      <!-- End call button -->
      <div class="video-section" [class.hidden]="(callStatus$ | async) === 'idle'">
        <button class="end-call-btn" (click)="endCall()">End Call</button>
      </div>

      <!-- Available Users Pool -->
      <div class="pool-section" [class.hidden]="(callStatus$ | async) !== 'idle'">
        <p *ngIf="(poolUsers$ | async)?.length === 0" class="empty-state">
          No users available right now. Adjust your filters or check back soon.
        </p>
        <div class="user-card" *ngFor="let user of poolUsers$ | async">
          <div class="user-info">
            <span class="name">{{ user.firstName }} {{ user.lastName }}</span>
            <span class="industry">{{ user.industry }}</span>
          </div>
          <button mat-flat-button color="primary" (click)="connect(user)">Connect</button>
        </div>
      </div>

    </div>
  </div>
</div>
