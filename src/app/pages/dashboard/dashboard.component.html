<div class="container-fluid">
  <div class="row">
    <div class="col-12 border-danger shadow-lg rounded-2">

      <mat-drawer-container class="bg-light">
        <!-- Drawer -->
        <mat-drawer #drawer class="styled-drawer" mode="side" [opened]="!commBus.isMobileView()">
          <div class="link-container mt-4">
            <ul class="nav flex-column">
              <li class="menu-title">Dashboard</li>

              <li class="nav-item">
                <button
                  (click)="commBus.isMobileView() && drawer.close()"
                  class="btn btn-primary w-100 mb-2"
                  [routerLink]="ApplicationRoutingEnum.POST_MATCH"
                  routerLinkActive="active">
                  <mat-icon class="me-2">edit_note</mat-icon>
                  Post & Match
                </button>
              </li>

              <li class="nav-item">
                <button
                  (click)="commBus.isMobileView() && drawer.close()"
                  class="btn btn-primary w-100 mb-2"
                  [routerLink]="ApplicationRoutingEnum.SCHEDULED_MATCH"
                  routerLinkActive="active">
                  <mat-icon class="me-2">video_camera_front</mat-icon>
                  My Meetings
                </button>
              </li>

            </ul>
          </div>
        </mat-drawer>

        <!-- Main Content -->
        <mat-drawer-content class="mat-drawer-content">

          <!-- Profile incomplete banner -->
          <div *ngIf="commBus.user && commBus.user.isProfileComplete === false" class="profile-incomplete-banner">
            <div class="banner-content">
              <mat-icon class="banner-icon">person_off</mat-icon>
              <div class="banner-text">
                <strong>Complete your profile</strong>
                <span>Add your date of birth, gender, city and state to start matching.</span>
              </div>
              <button mat-raised-button color="primary" class="banner-btn"
                      [routerLink]="['/dashboard/profile']"
                      [queryParams]="{sub: commBus.sub}">
                <mat-icon>edit</mat-icon> Complete Profile
              </button>
            </div>
          </div>

          <router-outlet></router-outlet>
        </mat-drawer-content>
      </mat-drawer-container>

      <app-fab-button-dashboard [drawer]="drawer"></app-fab-button-dashboard>

    </div>
  </div>
</div>
