<div class="container-fluid profile-card d-flex flex-column align-items-center p-4 rounded shadow-sm bg-white">
  <!-- User Information Section -->
  <div class="text-center mb-4">
    <mat-icon class="text-primary">account_circle</mat-icon>
    <!--    <h5 class="mt-3 user-name">{{ user?.attributes?.name || 'User' }}</h5>-->
    <p class="text-muted user-sub">{{ email || 'user@example.com' }}</p>
  </div>

  <!-- Application Details Section -->
  <div class="w-100 mb-2">
    <h6 class="text-primary text-center">Application Info</h6>
    <ul class="list-unstyled text-muted mb-0 text-center">
      <li class="nav-item mb-1"><strong>Version:</strong> 1.0.0</li>
      <li class="nav-item mb-1">
        <button mat-stroked-button color="primary" class="w-100 mb-1" (click)="editProfile()"
                matTooltip="Edit your profile">
          <mat-icon class="me-2">edit</mat-icon>
          Profile
        </button>
      </li>
      <li class="nav-item mb-1">
        <button color="warn" mat-stroked-button class="w-100"
                (click)="signOut($event)" matTooltip="Sign out of your account">
          <mat-icon class="me-2">logout</mat-icon>
          Logout
        </button>
      </li>
    </ul>
  </div>


</div>
