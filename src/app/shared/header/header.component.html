<div class="d-flex justify-content-between align-items-center main-header-bg px-3 py-1">
  <!-- Logo / Brand -->
  <div class="d-flex align-items-center">
    <a [routerLink]="'/'" class="text-decoration-none d-flex align-items-center gap-2">
      <mat-icon class="brand-icon">favorite</mat-icon>
      <span class="brand-name">Shall We Connect</span>
    </a>
  </div>

  <!-- Settings -->
  <ng-container *ngIf="commBus.sub">
    <div>
      <button mat-icon-button (click)="showSetting($event)">
        <mat-icon color="primary">settings</mat-icon>
      </button>
    </div>
  </ng-container>
</div>
