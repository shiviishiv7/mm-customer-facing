<div class="avatar-bar">

  <span class="bar-label">Avatar</span>

  <!-- Preset cards -->
  <div class="presets-row">

    <!-- No filter / raw camera -->
    <button class="preset-btn"
            [class.active]="(selected$ | async)?.id === 'none'"
            matTooltip="Show your real camera"
            (click)="noAvatar()">
      <span class="preset-emoji">📷</span>
      <span class="preset-name">No filter</span>
    </button>

    <button
      *ngFor="let p of presets"
      class="preset-btn"
      [class.active]="(selected$ | async)?.id === p.id"
      [matTooltip]="p.name"
      (click)="select(p)">
      <span class="preset-emoji">{{ p.emoji }}</span>
      <span class="preset-name">{{ p.name }}</span>
    </button>

    <!-- Upload own VRM -->
    <label class="preset-btn upload-btn" matTooltip="Upload a .vrm file">
      <input type="file" accept=".vrm" hidden (change)="onFileInput($event)">
      <mat-icon class="upload-icon">upload</mat-icon>
      <span class="preset-name">Upload</span>
    </label>

    <!-- VRoid Hub browser -->
    <button class="preset-btn vroid-btn" matTooltip="Browse millions of avatars on VRoid Hub"
            (click)="openVRoidBrowser()">
      <span class="preset-emoji">🎭</span>
      <span class="preset-name">VRoid Hub</span>
    </button>
  </div>

  <!-- Loading / error states -->
  <mat-progress-spinner
    *ngIf="loading$ | async"
    mode="indeterminate" diameter="20" color="accent"
    class="spinner">
  </mat-progress-spinner>

  <span class="error-msg" *ngIf="error$ | async as err">{{ err }}</span>

</div>
