# =========================================================================
#  Nginx config for shallweconnect.online
#  Frontend  → shallweconnect.online       (Angular static files)
#  Backend   → api.shallweconnect.online   (Spring Boot via Tomcat)
#
#  To install:
#    sudo cp nginx/matchmaking.conf /etc/nginx/conf.d/matchmaking.conf
#    sudo nginx -t
#    sudo systemctl reload nginx
# =========================================================================

# ── Redirect HTTP → HTTPS ─────────────────────────────────────────────────
server {
    listen 80;
    server_name shallweconnect.online www.shallweconnect.online api.shallweconnect.online;
    return 301 https://$host$request_uri;
}

# ── Frontend (shallweconnect.online) ─────────────────────────────────────
server {
    listen 443 ssl;
    server_name shallweconnect.online www.shallweconnect.online;

    ssl_certificate     /etc/letsencrypt/live/shallweconnect.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/shallweconnect.online/privkey.pem;

    root /home/ec2-user/frontend;
    index index.html;

    # Angular routing — all unknown routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets for 1 year
    location ~* \.(js|css|png|jpg|gif|ico|woff|woff2|svg|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

# ── Backend API + WebSocket (api.shallweconnect.online) ──────────────────
server {
    listen 443 ssl;
    server_name api.shallweconnect.online;

    ssl_certificate     /etc/letsencrypt/live/shallweconnect.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/shallweconnect.online/privkey.pem;

    # REST API
    location / {
        proxy_pass http://localhost:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket
    location /ws {
        proxy_pass http://localhost:8080/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
